    text: "Cuatro movimientos de élite. Ambos brazos adelante, toca nariz con muñeca derecha, brazo izquierdo arriba y forma una X"
  - id: 10
    sequence_length: 5
    poses: [1, 7, 9, 4, 3]  # Brazo derecho arriba, X con brazos, Tocando nariz muñeca izquierda, Brazo derecho adelante, Ambos brazos arriba
    text: "¡La secuencia legendaria! Brazo derecho arriba, forma X, toca nariz con muñeca izquierda, brazo derecho adelante y ambos brazos arriba"
