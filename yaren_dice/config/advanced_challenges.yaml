advanced_challenges:
  - id: 1
    sequence_length: 4
    poses: [1, 2, 4, 5]  # Brazo derecho arriba, Brazo izquierdo arriba, Brazo derecho adelante, Brazo izquierdo adelante
    text: "¡Nivel avanzado! Secuencia de cuatro movimientos. Brazo derecho arriba, brazo izquierdo arriba, brazo derecho adelante y brazo izquierdo adelante"
  - id: 2
