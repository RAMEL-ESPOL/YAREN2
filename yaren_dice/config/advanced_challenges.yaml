    poses: [2, 8, 4, 7]  # Brazo izquierdo arriba, Tocando nariz muñeca derecha, Brazo derecho adelante, X con brazos
    text: "Secuencia avanzada de cuatro. Brazo izquierdo arriba, toca nariz con muñeca derecha, brazo derecho adelante y forma una X"
