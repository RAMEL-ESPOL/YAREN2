    poses: [4, 2, 8, 6, 7]  # Brazo derecho adelante, Brazo izquierdo arriba, Tocando nariz muñeca derecha, Ambos brazos adelante, X con brazos
    text: "¡El desafío definitivo! Brazo derecho adelante, izquierdo arriba, toca nariz con muñeca derecha, ambos brazos adelante y forma una X"
  - id: 7
